<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · Storeganise Sales Dashboard</title>
<style>
  :root { color-scheme: light; --blue:#4188EF; --accent:#306ABF; --ink:#323338; --gray:#66717D; --line:#DFDFDF; --soft:#F1F7FF; --red:#E01C1C; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8F8F8; color: var(--ink);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 12px; width: 100%; max-width: 380px;
          padding: 32px 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
  .brand { font-size: 13px; font-weight: 600; color: var(--blue); letter-spacing: .3px; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--gray); margin-bottom: 22px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--gray); margin: 0 0 6px 2px; }
  input { width: 100%; padding: 11px 12px; font-size: 14px; border: 1px solid var(--line); border-radius: 8px;
          outline: none; margin-bottom: 16px; transition: border-color .15s; }
  input:focus { border-color: var(--blue); }
  button { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; color: #fff; background: var(--blue);
           border: none; border-radius: 8px; cursor: pointer; transition: background .15s; }
  button:hover { background: var(--accent); }
  .err { display: none; background: #FFECEC; color: var(--red); font-size: 12.5px; border: 1px solid #f6c9c9;
         border-radius: 8px; padding: 9px 11px; margin-bottom: 16px; }
  .err.show { display: block; }
  .gbtn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 11px;
          font-size: 14px; font-weight: 600; color: var(--ink); background: #fff; border: 1px solid var(--line);
          border-radius: 8px; cursor: pointer; text-decoration: none; transition: background .15s, border-color .15s; }
  .gbtn:hover { background: #fafbfc; border-color: #c9ced3; }
  .gbtn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .divider { display: flex; align-items: center; gap: 10px; color: #979CA1; font-size: 11px; margin: 18px 0; }
  .divider::before, .divider::after { content: ""; height: 1px; background: var(--line); flex: 1; }
  .foot { font-size: 11px; color: #979CA1; text-align: center; margin-top: 18px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Storeganise</div>
    <h1>Sales Dashboard</h1>
    <div class="sub">Sign in with your Storeganise Google account.</div>
    <div id="err" class="err"></div>
    <a class="gbtn" href="/api/auth/start">
      <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 7l7.1 5.5C43.3 37.4 46.1 31.5 46.1 24.5z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.4 0 11.9-2.1 15.8-5.8l-7.1-5.5c-2 1.3-4.5 2.1-8.7 2.1-6.3 0-11.7-3.7-13.6-9.4l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
      Continue with Google
    </a>
    <div class="foot">Access is restricted to @storeganise.com accounts.</div>
  </div>
  <script>
    var e = new URLSearchParams(location.search).get('e');
    if (e) {
      var box = document.getElementById('err');
      box.textContent = e === '2'
        ? 'Please sign in with your @storeganise.com Google account.'
        : 'Sign-in failed. Please try again.';
      box.classList.add('show');
    }
  </script>
</body>
</html>
